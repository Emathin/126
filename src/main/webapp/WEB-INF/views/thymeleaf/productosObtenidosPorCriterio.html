<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.0/css/bootstrap.min.css}"/>
    <meta charset="UTF-8">
    <title>ProductosObtenidosPorCriterio</title>
</head>
<body>
<div class="container mt-5">
    <div class="table-responsive">
        <table class="table table-striped table-hover table-bordered shadow-sm" style="width:100%">
            <th class="mb-4 text-primary">Productos por criterio</th>
            <tr class="table-dark">
                <td>Id</td>
                <td>Nombre</td>
                <td>Precio</td>
                <td>Cantiad</td>
            </tr>
            <tr th:each="p: ${productos}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.precio}"></td>
                <td th:text="${p.stock}"></td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
